# Configuration for Thermal IR Colorization Pipeline
# Using Bands: B2 (Blue), B3 (Green), B4 (Red), B10 (Thermal)

# Data Configuration
data:
  raw_dir: './data/raw'
  processed_dir: './data/processed'
  patch_size: 256
  stride: 128
  img_size: [256, 256]
  batch_size: 8
  num_workers: 4
  # Landsat Bands
  rgb_bands: [4, 3, 2]  # Red, Green, Blue
  thermal_band: 10       # Only Band 10 available

# Model Configuration
model:
  generator:
    in_channels: 1      # Single thermal band
    out_channels: 3     # RGB output
    base_channels: 64
    num_res_blocks: 9
    use_semantic: true
  discriminator:
    input_channels: 4   # RGB (3) + Thermal (1)
    base_channels: 64
    n_layers: 3
  super_resolution:
    in_channels: 1
    out_channels: 1
    base_channels: 64
    num_blocks: 8
    scale_factor: 2

# Training Configuration
training:
  g_lr: 0.0002
  d_lr: 0.0002
  num_epochs: 50
  lr_step: 10
  lr_gamma: 0.5
  lambda_adv: 0.03
  lambda_perceptual: 1.0
  lambda_tv: 1.0
  lambda_semantic: 0.5
  checkpoint_interval: 5
  log_interval: 10

# Evaluation Configuration
evaluation:
  metrics: ['psnr', 'ssim', 'fid']
  batch_size: 1
  num_samples: 100

# Inference Configuration
inference:
  tile_size: 256
  overlap: 32

# Logging
logging:
  log_dir: './logs'
  checkpoint_dir: './checkpoints'
  output_dir: './outputs'
  sample_interval: 5